name: Lint and Format

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  lint-format:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.1

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      # Re-enable after running `bun run format` on the repo:
      # - name: Check formatting
      #   run: bun run format:check

      - name: Build
        run: bun run build
